name: Profile Summary Cards
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate
    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@v0.7.0
        with:
          USERNAME: algojogacor
          UTC_OFFSET: 7
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: "output"
          AUTO_INIT: true